<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fantastic Hotel</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:white;
}

/* DARK MODE */
.dark-mode{
    background:#1e1e1e;
    color:white;
}

.dark-mode .menus{
    background:#160576;
}

.dark-mode .form1,
.dark-mode .form2{
    background:#2b2b2b;
    color:white;
}

/* NAVBAR */
.menus{
    background:rgb(3,3,97);
    width:100%;
    padding:15px;
    text-align:center;
}

.menus h1{
    color:white;
    margin-bottom:15px;
    font-size:25px;
}

.menus span{
    color:orange;
}

.menu{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.menu a{
    text-decoration:none;
    color:white;
    font-size:17px;
    transition:0.3s;
}

.menu a:hover{
    color:orange;
}

/* BUTTON */
.bt{
    margin-top:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:black;
    color:white;
}

.dark-mode button{
    background:white;
    color:black;
}

/* TITLE */
h2{
    text-align:center;
    margin:30px 0;
    color:black;
}

.dark-mode h2{
    color:white;
}

/* FORMS CONTAINER */
.myp{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
}

/* FORMS */
.form1,
.form2{
    width:45%;
    border:2px solid blue;
    border-radius:25px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* FORM TITLES */
.sub,
.sub1{
    background:rgb(3,3,173);
    color:white;
    padding:15px;
    border-radius:20px 20px 0 0;
    text-align:center;
    margin-bottom:20px;
    font-size:20px;
}

/* INPUTS */
input,
select{
    width:100%;
    height:45px;
    margin-top:5px;
    margin-bottom:15px;
    padding:10px;
}

/* SUBMIT BUTTON */
.as{
    display:block;
    width:200px;
    margin:30px auto;
    padding:15px;
    text-align:center;
    text-decoration:none;
    color:white;
    background:rgb(1,1,84);
    border-radius:30px;
    font-size:20px;
}

/* FOOTER */
footer{
    background:linear-gradient(-80deg,#624a04 50%,#0d0262 50px);
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}

/* RESPONSIVE */
@media(max-width:780px){

    .menus h1{
        font-size:18px;
    }

    .menu{
        flex-direction:column;
        gap:10px;
    }

    .form1,
    .form2{
        width:95%;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="menus">

    <h1>FANTASTIC <span>HOTEL MANAGEMENT SYSTEM</span></h1>

    <div class="menu">
        <a href="FANTASTIC.html">Home</a>
        <a href="FANTASTIC1.html">About</a>
        <a href="FANTASTIC2.html">Gallery</a>
        <a href="FANTASTIC3.html">Rooms</a>
        <a href="FANTASTIC4.html">Contact Us</a>
        <a href="FANTASTIC5.html">Reservation</a>
    </div>

    <div class="bt">
        <button onclick="toggleMode()">🌙 / ☀️ Toggle Mode</button>
    </div>

</div>

<!-- TITLE -->
<h2>RESERVATION</h2>

<!-- FORMS -->
<div class="myp">

<form class="form1">

    <div class="sub">
        PERSONAL INFORMATION
    </div>

    <label>Title</label>
    <select>
        <option>Select Option</option>
    </select>

    <label>First Name</label>
    <input type="text">

    <label>Last Name</label>
    <input type="text">

    <label>Email</label>
    <input type="email">

    <label>Nationality</label><br><br>

    <input type="radio" name="nation"> Rwanda
    <input type="radio" name="nation"> Other

    <br><br>

    <label>Passport Country</label>
    <select>
        <option>Select Option</option>
    </select>

    <label>Phone Number</label>
    <input type="number">

</form>

<form class="form2">

    <div class="sub1">
        RESERVATION INFORMATION
    </div>

    <label>Type of Room</label>
    <select>
        <option>Select Option</option>
    </select>

    <label>Bedding Type</label>
    <select>
        <option>Select Option</option>
    </select>

    <label>Number of Rooms</label>
    <select>
        <option>Select Option</option>
    </select>

    <label>Meal Type</label>
    <input type="text">

    <label>Check-in</label>
    <input type="date">

    <label>Payment Mode</label>
    <select>
        <option>Select Option</option>
    </select>

</form>

</div>

<!-- SUBMIT -->
<a href="FANTASTIC.html" class="as">Submit</a>

<!-- FOOTER -->
<footer>
    &copy; FANTASTIC HOTEL 2026
</footer>

<script>

function toggleMode(){

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("mode","dark");
    }else{
        localStorage.setItem("mode","light");
    }
}

window.onload = function(){

    if(localStorage.getItem("mode") === "dark"){
        document.body.classList.add("dark-mode");
    }
}

</script>

</body>
</html>
